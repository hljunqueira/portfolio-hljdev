version: '3.8'

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: hlj-evolution
    ports:
      - '3013:8080'
    environment:
      - SERVER_URL=https://evolution.hljdev.com.br
      - SERVER_PORT=8080
      - CORS_ORIGIN=*
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=hlj_ev_apikey_2026_secure_key
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_CLIENT=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:YOUR_SUPABASE_PASSWORD@supabase-db:15432/hlj_evolution_db?sslmode=disable
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_LABELS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - CACHE_LOCAL_ENABLED=true
      - CACHE_REDIS_ENABLED=false
      - REDIS_ENABLED=false
      - LOG_LEVEL=ERROR
      - DEL_INSTANCE=false
      - DEL_TEMP_INSTANCES=true
      - INSTANCE_EXPIRATION_TIME=false
      - TELEMETRY=false
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1033773198
      - TZ=America/Sao_Paulo
    volumes:
      - ./evolution_data:/evolution/instances
    restart: always
    networks:
      - hlj-network
      - supabase_default

networks:
  hlj-network:
    name: hlj-network
    external: true
  supabase_default:
    external: true
